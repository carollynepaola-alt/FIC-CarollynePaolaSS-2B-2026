<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documento Corrigido</title>
    <link rel="stylesheet" href="style.css">
</head><!-- essa tag funciona como um tipo de cabeçalho que define dados importantes para o navegador. -->
<body>

    <header>
        <h1 style="color: antiquewhite;">Yuyuyuy</h1><!-- erve para definir o título principal de uma página. -->
        <nav><!-- ele é usado para marcar seções de navegação em um site,como menus principais com links para outras páginas ou seções. -->
            <h2>Tim</h2>
            <a href="#sobre">Sobre</a><br><!-- o ''a href''' serve para levar o usuario a sessao "sobre" -->
            <a href="#sol">Sol</a><br><!-- o ''a href''' serve para levar o usuario a sessao "sol" -->
            <a href="#gol">Gol</a><br><!-- o ''a href''' serve para levar o usuario a sessao "gol" -->
        </nav>
    </header>

    <main>
        <h1 style="font-size: 80px;">Lua</h1>
        <h1 style="background-color: bisque;">Sol</h1>

        <ol>
            <li>poli</li><!-- o  li serve para definir cada item individual dentro de uma lita.-->
            <li>popov</li>
            <li>asasa</li>
        </ol><!-- lista ordenada de informações. -->

        <ul><!-- lista nãp ordenada de informações. -->
            <li>poli</li>
            <li>popo</li>
            <li>asasa</li>
        </ul>
        <img src="https://tse1.mm.bing.net/th/id/OIP.OC7lzC4k_YuCvpCuZwP5ZwHaE8?rs=1&pid=ImgDetMain&o=7&rm=3"
             alt="Imagem do espaço" width="300"><!-- o img src é usado para especificar o caminho da imagem que será exibida na página web. -->

        <p style="background-color: beige;">Saturno</p><!-- o background color  é usado  para definir a cor de fundo de um elemento HTML. -->
        <h1 style="font-family: Verdana;">Bula</h1><!-- essa tag serve para definir a fonte de um texto como verdana. -->
        <a href="https://www.google.com" target="_blank">Google</a><br>
        <b>Dado</b>

        <h1 style="text-align: center;">Centralizado</h1>
        <h1 style="text-align: center;">Lua</h1><!-- serve para centralizar horizontalmente o texto e outros conteúdos embutidos dentro de um elemento HTMl de nível de bloco. -->

        <!--a tag section serve para agrupar conteúdo relacionado em seções tématicas autônomas de um documento. -->
        <section id="sobre">
            <h2>Claro</h2><!-- o h2 é utilizada para criar subtítulos principais,organizando o conteúdo de uma página em seções e tópicos. -->
            <p>Operadora</p>
        </section>

        <section id="sol"><!-- o atributo id serve para identificar um único elemento em um doucumento HTMl.-->
            <h2>Lindo e quente</h2>
            <p>Planetas luminosos</p><!-- o p é utilizada para definir um parágrafo de texto. -->
        </section>

        <section id="gol">
            <h2>Uauuuu</h2>
            <p>CR7 é o melhor</p>
        </section>
    </main>

</body><!-- o body serve para delimitar e agrupar todo conteúdo viísivel de uma página web,como textos,imagens,vídeos,links e outros elementos interativos. -->
<footer><!-- ele serve para agrupar conteúdo de encerramento,como informações de direitos autorais,dados do autor,links de navegação para páginas relevantes e informações de contato. -->
    <p>este é o final do meu site</p>
</footer>
</html>
